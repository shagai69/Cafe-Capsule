<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ажилтан — Ирц бүртгэл</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(135deg,#f8f0e8,#efe6da);font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:16px}
  .card{background:#fff;border-radius:20px;padding:24px 22px;width:100%;max-width:440px;box-shadow:0 8px 32px rgba(61,44,30,.10)}
  h1{font-size:22px;font-weight:800;color:#3d2c1e;margin-bottom:4px}
  .sub{color:#a07850;font-size:13px;margin-bottom:24px}
  label{display:block;font-size:11px;font-weight:700;color:#a07850;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  input[type=text],input[type=month]{width:100%;padding:11px 13px;border-radius:10px;border:2px solid #e8ddd4;font-size:15px;margin-bottom:12px;outline:none;color:#3d2c1e;font-family:inherit}
  .btn-primary{width:100%;padding:13px;background:#3d2c1e;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-ghost{padding:10px 16px;background:#f0e8e0;color:#3d2c1e;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .chk-btn{padding:15px 6px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .status-box{background:#f8f4f0;border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#7a5c42}
  .salary-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .salary-amt{font-size:20px;font-weight:800;color:#15803d}
  hr{border:none;border-top:1px solid #f0e8e0;margin:16px 0}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{padding:6px 8px;text-align:left;color:#a07850;font-weight:700;white-space:nowrap;border-bottom:2px solid #e8ddd4;background:#f8f4f0}
  td{padding:6px 8px;border-bottom:1px solid #f0e8e0;white-space:nowrap;color:#3d2c1e}
  .success-card{text-align:center;padding:40px 24px}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 24px;border-radius:30px;font-weight:700;font-size:14px;z-index:9999}
  .row-flex{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .scroll-table{max-height:220px;overflow-y:auto}
  .loading{text-align:center;color:#a07850;padding:20px;font-size:14px}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid #e8ddd4;border-top-color:#3d2c1e;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card" id="app"><div class="loading"><span class="spinner"></span>Ачааллаж байна...</div></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── ТОХИРГОО: Firebase console-оос авна ──
const firebaseConfig = {
  apiKey:            "AIzaSyCizUzQHQDpDyv8DljEMQNCHfKAFmSkvqg",
  authDomain:        "irtsiin-system.firebaseapp.com",
  projectId:         "irtsiin-system",
  storageBucket:     "irtsiin-system.firebasestorage.app",
  messagingSenderId: "990981947127",
  appId:             "1:990981947127:web:86d4ecd4e7ec2c1aa7ddf2"
};
// ─────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const DAYS = ["Ня","Да","Мя","Лх","Пү","Ба","Бя"];
function getToday(){
  const d=new Date();
  const fd=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  return{date:`${d.getMonth()+1}/${d.getDate()}`,day:DAYS[d.getDay()],fullDate:fd};
}
function getNow(){const d=new Date();return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function calcH(i,o){if(!i||!o)return 0;const[ih,im]=i.split(":").map(Number);const[oh,om]=o.split(":").map(Number);return Math.max(0,(oh*60+om-ih*60-im)/60);}
function totalH(r){return calcH(r.morningIn,r.morningOut)+calcH(r.eveningIn,r.eveningOut);}
function fmtH(h){const hr=Math.floor(h),m=Math.round((h-hr)*60);return m?`${hr}ц ${m}мин`:`${hr}ц`;}

// Config-г Firestore-оос унших
async function getConfig(){
  try{
    const snap=await getDoc(doc(db,"config","main"));
    return snap.exists()?snap.data():{title:"Цэс",hourlyRate:7000};
  }catch{return{title:"Цэс",hourlyRate:7000};}
}

// Өнөөдрийн бүртгэл унших
async function getTodayRec(name){
  const t=getToday();
  const id=`${t.fullDate}__${name}`;
  try{
    const snap=await getDoc(doc(db,"attendance",id));
    return snap.exists()?snap.data():{};
  }catch{return{};}
}

// Сарын бүртгэл унших
async function getMonthRecs(month,name){
  try{
    const q=query(
      collection(db,"attendance"),
      where("fullDate",">=",month+"-01"),
      where("fullDate","<=",month+"-31"),
      where("name","==",name),
      orderBy("fullDate")
    );
    const snap=await getDocs(q);
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){
    console.error(e);
    return[];
  }
}

// Цаг бүртгэх
async function checkIn(name,type){
  const t=getToday();
  const id=`${t.fullDate}__${name}`;
  const now=getNow();
  const ref=doc(db,"attendance",id);
  const snap=await getDoc(ref);
  const existing=snap.exists()?snap.data():{date:t.date,day:t.day,name,fullDate:t.fullDate};
  const update={...existing};
  if(type==="mi") update.morningIn=now;
  else if(type==="mo") update.morningOut=now;
  else if(type==="ei") update.eveningIn=now;
  else if(type==="eo") update.eveningOut=now;
  await setDoc(ref,update);
  return now;
}

// ── STATE ──
let ST={screen:"name",name:"",empMonth:(()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`})(),checkedIn:null,cfg:{title:"Цэс",hourlyRate:7000},todayRec:{},empRecs:[],loading:false};

function showToast(txt,bg="#22c55e"){
  let t=document.createElement("div");
  t.className="toast";t.style.background=bg;t.textContent=txt;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

async function init(){
  ST.cfg=await getConfig();
  render();
}

async function render(){
  const app=document.getElementById("app");
  const {cfg,screen,name,empMonth,checkedIn,todayRec,empRecs,loading}=ST;
  const HOURLY=cfg.hourlyRate||7000;
  const today=getToday();

  if(checkedIn){
    const labels={mi:"🌅 Өглөө ирсэн",mo:"🌤 Өглөө явсан",ei:"🌆 Орой ирсэн",eo:"🌙 Орой явсан"};
    app.innerHTML=`<div class="success-card">
      <div style="font-size:52px">✅</div>
      <div style="font-size:22px;font-weight:800;color:#3d2c1e;margin:8px 0 4px">${checkedIn.name}</div>
      <div style="color:#a07850;font-size:15px">${labels[checkedIn.type]} · ${checkedIn.time}</div>
    </div>`;
    return;
  }

  if(screen==="name"){
    app.innerHTML=`
      <h1>☕ ${cfg.title}</h1>
      <p class="sub">${today.date} · ${today.day} — Ажилтан</p>
      <label>Нэрээ бичнэ үү</label>
      <input type="text" id="nameIn" placeholder="Жишээ: Болд" style="font-size:17px"/>
      <button class="btn-primary" id="nextBtn">Үргэлжлүүлэх →</button>`;
    const inp=document.getElementById("nameIn");
    inp.focus();
    inp.onkeydown=e=>{if(e.key==="Enter")confirmName();};
    document.getElementById("nextBtn").onclick=confirmName;
    return;
  }

  if(screen==="checkin"){
    const totalHrs=empRecs.reduce((s,r)=>s+totalH(r),0);
    const salary=Math.round(totalHrs*HOURLY);
    const r=todayRec;

    const btnCfg=[
      {type:"mi",label:"🌅 Өглөө ирлээ",dis:!!r.morningIn},
      {type:"mo",label:"🌤 Өглөө явлаа",dis:!r.morningIn||!!r.morningOut},
      {type:"ei",label:"🌆 Орой ирлээ",dis:!!r.eveningIn},
      {type:"eo",label:"🌙 Орой явлаа",dis:!r.eveningIn||!!r.eveningOut},
    ];

    const tableRows=empRecs.length===0
      ?`<tr><td colspan="5" style="text-align:center;color:#aaa;padding:12px">Бүртгэл байхгүй</td></tr>`
      :empRecs.map((r,i)=>{
        const h=totalH(r);
        return`<tr style="background:${i%2===0?"#fff":"#faf8f6"}">
          <td>${r.date} ${r.day}</td>
          <td>${r.morningIn||"—"}→${r.morningOut||"—"}</td>
          <td>${r.eveningIn||"—"}→${r.eveningOut||"—"}</td>
          <td>${h>0?fmtH(h):"—"}</td>
          <td style="font-weight:600;color:#15803d">${h>0?Math.round(h*HOURLY).toLocaleString()+"₮":"—"}</td>
        </tr>`;
      }).join("");

    app.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">
        <div><h1 style="font-size:18px">👤 ${name}</h1><p class="sub" style="margin-bottom:0">${today.date} · ${today.day}</p></div>
        <button class="btn-ghost" id="backBtn">← Буцах</button>
      </div>
      <div class="status-box">
        <strong>${name}</strong> — өнөөдөр<br>
        <span style="font-size:12px">Өглөө: ${r.morningIn||"—"} → ${r.morningOut||"—"} &nbsp;|&nbsp; Орой: ${r.eveningIn||"—"} → ${r.eveningOut||"—"}</span>
      </div>
      <div class="grid2">
        ${btnCfg.map(b=>`<button class="chk-btn" data-type="${b.type}"
          style="background:${b.dis?"#f0ece8":"#3d2c1e"};color:${b.dis?"#c4b4a4":"#fff"};cursor:${b.dis?"not-allowed":"pointer"}"
          ${b.dis?"disabled":""}>
          ${b.label}${b.dis?" ✓":""}
        </button>`).join("")}
      </div>
      ${loading?`<div class="loading"><span class="spinner"></span>Хадгалж байна...</div>`:""}
      <hr/>
      <div class="row-flex">
        <label style="margin-bottom:0">Миний бүртгэл</label>
        <input type="month" id="empMonthIn" value="${empMonth}" style="font-size:12px;border:1px solid #e8ddd4;border-radius:8px;padding:4px 8px;color:#3d2c1e;font-family:inherit;width:auto"/>
      </div>
      <div class="salary-box" style="margin-top:8px">
        <div style="font-size:13px;color:#166534">Нийт цаг: <strong>${fmtH(totalHrs)}</strong><br><span style="font-size:11px;color:#86efac">Тариф: ${HOURLY.toLocaleString()}₮/цаг</span></div>
        <div class="salary-amt">${salary.toLocaleString()}₮</div>
      </div>
      <div class="scroll-table"><table>
        <thead><tr><th>Огноо</th><th>Өглөө</th><th>Орой</th><th>Цаг</th><th>Цалин</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table></div>`;

    document.getElementById("backBtn").onclick=()=>{ST.screen="name";ST.name="";render();};
    document.getElementById("empMonthIn").onchange=async e=>{
      ST.empMonth=e.target.value;
      ST.loading=true;render();
      ST.empRecs=await getMonthRecs(ST.empMonth,ST.name);
      ST.loading=false;render();
    };
    document.querySelectorAll(".chk-btn:not([disabled])").forEach(btn=>{
      btn.onclick=async()=>{
        const type=btn.dataset.type;
        ST.loading=true;render();
        try{
          const time=await checkIn(ST.name,type);
          ST.checkedIn={name:ST.name,type,time};
          ST.screen="name";ST.name="";
          render();
          setTimeout(async()=>{ST.checkedIn=null;render();},4000);
        }catch(e){
          ST.loading=false;
          showToast("Алдаа гарлаа: "+e.message,"#ef4444");
          render();
        }
      };
    });
  }
}

async function confirmName(){
  const val=document.getElementById("nameIn")?.value.trim();
  if(!val)return;
  ST.name=val;ST.screen="checkin";ST.loading=true;render();
  const [tr,mr]=await Promise.all([getTodayRec(val),getMonthRecs(ST.empMonth,val)]);
  ST.todayRec=tr;ST.empRecs=mr;ST.loading=false;
  render();
}

init();
</script>
</body>
</html>
