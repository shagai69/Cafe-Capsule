function calcH(i,o){
 if(!i||!o)return 0;
 const[ih,im]=i.split(":").map(Number);
 const[oh,om]=o.split(":").map(Number);
 return Math.max(0,(oh*60+om-ih*60-im)/60);
}
function totalH(r){
 if(r.morningIn||r.eveningIn||r.morningOut||r.eveningOut)
   return calcH(r.morningIn,r.morningOut)+calcH(r.eveningIn,r.eveningOut);
 return calcH(r.inTime,r.outTime);
}
function getInTime(r){return r.morningIn||r.eveningIn||r.inTime||null;}
function getOutTime(r){return r.morningOut||r.eveningOut||r.outTime||null;}
function hasData(r){return !!(getInTime(r)||getOutTime(r));}
function isIncomplete(r){return !getInTime(r)||!getOutTime(r);}
function fmtH(h){const hr=Math.floor(h),m=Math.round((h-hr)*60);return m?`${hr}СҶ ${m}РјРёРҪ`:`${hr}СҶ`;}

function getPeriods(year,month){

}

async function getPeriodRecs(start,end){
 try{
   const q=query(collection(db,"attendance"),where("fullDate",">=",start),where("fullDate","<=",end),orderBy("fullDate"));

 }catch(e){console.error(e);return[];}
}
